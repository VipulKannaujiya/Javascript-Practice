<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Sign In</title>
  <style>
    /* body { 
      font-family: Arial, sans-serif;
      background-color: #f3f2ef;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }*/

    .login-container {
      background-color: white;
      padding: 30px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 8px;

      
    }

    h2 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .forgot {
      color: #0a66c2;
      font-size: 14px;
      text-align: right;
      display: block;
      margin-bottom: 16px;
      text-decoration: none;
    }

    .sign-in-btn {
      background-color: #0a66c2;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .divider {
      text-align: center;
      margin: 15px 0;
      color: #999;
    }

    .google-btn,
    .apple-btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      margin: 8px 0;
      border-radius: 30px;
      text-align: center;
      cursor: pointer;
      background-color: white;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
    }
    .footer a {
      color: #0a66c2;
      text-decoration: none;
    }
    #main
    {
      font-family: Arial, sans-serif;
      background-color: #f3f2ef;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin-top: -110px;
    }
  </style>
</head>
<body>
    <img id="linkimage" src="Linkedin.png" width="150px" height="100px"/>
    <div id="main">
  <div class="login-container">
    <h2>Sign in</h2>
    <p style="font-size: 14px; margin-bottom: 10px;">Stay updated on your professional world.</p>
    
    <input type="text" placeholder="Email or phone">
    <input type="password" placeholder="Password">
    <a href="#" class="forgot">Forgot password?</a>

    <button class="sign-in-btn">Sign in</button>

    <div class="divider">or</div>

    <div class="google-btn"> <img src="Google.webp" width="30px" height="30px" style="vertical-align: middle;"/>&nbsp;Continue with Google</div>
    <div class="apple-btn"> <img src="apple.png" width="30px" height="30px" style="vertical-align: middle;"/>&nbsp;Sign in with Apple</div>

    <div class="footer">
      New to LinkedIn? <a href="#">Join now</a>
    </div>
  </div>
  </div>
</body>
</html>
