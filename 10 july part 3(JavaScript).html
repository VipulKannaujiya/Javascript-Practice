<html>
    <head>
        <style>
            h1
            {
                text-align: center;
                color: rgb(0, 0, 0);
                font-weight: bold;
                background-color: rgb(242, 255, 0);
                border-radius: 50%;
                box-shadow:inset 0px 0px 10px black;
            }
            table
            {
                box-shadow:inset 0px 0px 30px rgb(0, 0, 0);
                padding: 20px;
                background-color: aqua;
                
            }
            button
            {
                width: 50px;
                height: 50px;
                border: 0px;
                Outline: 0px;
                background-color: yellow;
                box-shadow: 0px 0px 5px gray;
                font-weight: bold;
                font-size: 20px;
                border-radius: 20px;
            }
            input
            {
                width: 100%;
                height: 60px;
                font-size: 25px;
                font-weight: bold;
                text-align: right;
                border: 0px;
                outline: 0px;
                background-color: rgb(244, 244, 244);
            }
            button:hover
            {
                transform: scale(1.3);
                color: white;
                background-color: blue;
                transition: 0.5s;
                border: 1px solid white;
                box-shadow: 0px 0px 5px black;
            }
            body
            {
                background: linear-gradient(red, yellow);
            }
        </style>
    </head>
<body>
    <h1> Apna Calculator </h1>
    <table align="center" cellpadding="10px">
        <tr>
           <td colspan="4">
            <input type="text" id="t1" readonly/>
           </td>
        </tr>
        
        <tr>
            <td><button onclick="del()">C</button></td>
            <td><button onclick="backspace()">&larr;</button></td>
            <td><button onclick="mybtn('+')">+</button></td>
            <td><button onclick="mybtn('-')">-</button></td>
        </tr>
        
        <tr>
            <td><button onclick="mybtn('7')">7</button></td>
            <td><button onclick="mybtn('8')">8</button></td>
            <td><button onclick="mybtn('9')">9</button></td>
            <td><button onclick="mybtn('*')">*</button></td>
        </tr>
        
        <tr>
            <td><button onclick="mybtn('4')">4</button></td>
            <td><button onclick="mybtn('5')">5</button></td>
            <td><button onclick="mybtn('6')">6</button></td>
            <td><button onclick="mybtn('/')">/</button></td>
        </tr>
        
        <tr>
            <td><button onclick="mybtn('1')">1</button></td>
            <td><button onclick="mybtn('2')" >2</button></td>
            <td><button onclick="mybtn('3')">3</button></td>
            <td><button onclick="mybtn('%')" class="btns">=</button></td>
        </tr>
        
        <tr>
            <td><button onclick="mybtn('0')">0</button></td>
            <td><button onclick="mybtn('.')">.</button></td>
            <td colspan="2"><button onclick="result()">%</button></td>
        </tr>
        
    </table>
    
    
    <script>
        function mybtn(x)
        {
            t1.value += x;
        }
        function result()
        {
            var a = eval(t1.value);
            t1.value = a;
        }
        function del()
        {
            t1.value = " ";
        }
        function backspace()
        {
            t1.value = t1.value.slice(0,-1);
        }
    </script>
</body>
</html>
