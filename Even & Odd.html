<htnl>
    <head>
        <style>
            body
            {
                background: linear-gradient(#a3ffb5, #f890ff)
            }
            #box1
            {
                width: 500px;
                height: 300px;
                border: 1px solid black;
                margin: 0px auto;
                border-radius: 20px;
                box-shadow:inset 0px 0px 20px #000000;
            }
            h2
            {
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #btn
            {
                width: 100px;
                font-size: 20px;
                margin-left: 195px;
                margin-top: 20px;
                background-color: blue;
                color: white;
            }
            #btn:hover
            {
                transform: scale(1.1);
                background-color: aquamarine;
                color: black;
                transition: 0.5s;
                border-radius: 50%;
            }
            #result
            {
                text-align: center;
                font-size: 40px;
            }
            #t1
            {
                border-radius: 50px;
                text-align: center;
            }
        </style>
    </head>
<body>
    <h1 style="text-align: center;"> Task 1:- Even & Odd Number Checker </h1>

    <div id="box1">
        <h2>Even or Odd Number Checker</h2>

        <input id="t1" type="number" style="width:400px; height: 40px; margin-left: 50px; font-size: 20px;" /><br/><br/>

        <button id="btn" onclick="even()">Click</button>

        <p id="result"></p>
    </div>


    <script>
        function even()
        {
            a = t1.value;
            if ( a == "")
            {
                result.innerHTML = "Enter Any Number";
            }
            else if ( a % 2 == 0)
            {
               result.innerHTML ="Even";
            }
            else
            {
               result.innerHTML ="Odd";
            }
        }


    </script>
</body>
</html>
