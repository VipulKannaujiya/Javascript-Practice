<html>
    <head>
        <style>
            body
            {
                background: linear-gradient(yellow,lime);
            }
            #box
            {
                background-color: rgb(216, 136, 136);
                width: 500px;
                height: 300px;
                border-radius: 20px;
                margin: 0px auto;
                margin-top: 200px;
                font-family: cursive;
                text-align: center;
                font-size:30px;
                font-weight: bold;
                padding-top: 20px;
                box-shadow: -15px 20px 10px black;
                
            }
            #ibox
            {
                width: 280px;
                height: 50px;
                border: 2px solid black;
                border-radius: 10px;
            }
            button
            {
                width: 280px;
                height: 50px;
                border: 2px solid black;
                border-radius: 10px;
                background-color: blue;
                color: white;
                margin-top: 30px;
                font-size: 25px;
            }
            button:hover
            {
                transform: scale(1.1);
                background-color: green;
                color: white;
                font-size: 30px;
                transition: 0.5s;
                border: 1px solid white;
                box-shadow: 0px 0px 20px rgb(0, 255, 255);
            }
            #obox
            {
                height: 50px;
                width: 280px;
                text-align: center;
                font-size: 25px;
                border-radius: 50%;
                margin-top: 10px;
                /* border: 0px; */
            }
        </style>
    </head>
    <body>
        <div id="box">Farenheit to <br/>Celcius<br/>
        <input id="ibox" type="text"/>
        
        <button onclick="convert()">Convert</button>
        <input id="obox" type="text"/>
        </div>
        <script>
            
            function convert(x)
            {
                x=ibox.value;
                var c= (x-32)* 5/9;
                obox.value=c;
            }
        </script>
    </body>
</html>
