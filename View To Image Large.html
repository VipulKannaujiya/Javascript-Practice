<html>
<head>
   <style>
       body
       {
           text-align: center;
           background: linear-gradient(#a9f9ff, #d796ff);
       }
       h1
       {
        margin-top: 50px;
        font-family: Arial;
       }
       img
       {
           margin: 10px;
           border-radius: 10px;
       }
       #img1
       {
            box-shadow: -3px 10px 15px gray;
       }
       #img1:hover
       {
            transform: scale(1.1);
            transition: 0.1s;
            box-shadow: 0px 10px 15px gray;
       }
       #imgdown
       {
            border: 1px double rgb(255, 255, 255);
            box-shadow: 0px 5px 10px black;
       }
       #imgdown:hover
       {
            transform: scale(1.1);
            box-shadow: 0px 0px 5px black;
            transition: 0.1s;
       }
   </style>
</head>
<body>
    <h1> 🖼️Click To Image View Large </h1>
    
    <img id="img1" src="i1.jpg" style="height: 300px; width: 500px;">
    
    <br/><br/><br/>

    <img id="imgdown" onclick="zoom(this)" src="i2.jpg" style="height: 80px; width: 120px;">
    <img id="imgdown" onclick="zoom(this)" src="i3.jpg" style="height: 80px; width: 120px;">
    <img id="imgdown" onclick="zoom(this)" src="i4.jpg" style="height: 80px; width: 120px;">
    <img id="imgdown" onclick="zoom(this)" src="i5.jpg" style="height: 80px; width: 120px;">
    <img id="imgdown" onclick="zoom(this)" src="i6.jpg" style="height: 80px; width: 120px;">
    <img id="imgdown" onclick="zoom(this)" src="i7.jpg" style="height: 80px; width: 120px;">
    
    <script>
        
        function zoom(e)
        {
            var a = img1.src;
            img1.src = e.src;
            e.src = a;
        }
        
    </script>
</body>
</html>
